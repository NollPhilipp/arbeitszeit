<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Arbeitszeit Rechner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,300;9..144,600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --card: #161820;
    --border: #2a2d3a;
    --accent: #c8f060;
    --accent2: #60d4f0;
    --accent3: #f0a060;
    --text: #e8eaf0;
    --muted: #6b6f80;
    --red: #f06060;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
    overflow-x: hidden;
  }

  header {
    text-align: center;
    margin-bottom: 28px;
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(1.8rem, 6vw, 2.6rem);
    font-weight: 300;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1.1;
  }

  header h1 span { color: var(--accent); }

  header p {
    color: var(--muted);
    font-size: 0.75rem;
    margin-top: 6px;
    letter-spacing: 0.08em;
  }

  /* Tab switcher */
  .tabs {
    display: flex;
    gap: 8px;
    width: 100%;
    max-width: 400px;
    margin-bottom: 20px;
  }

  .tab {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .tab.active {
    background: var(--accent);
    color: #0d0f14;
    border-color: var(--accent);
    font-weight: 500;
  }

  .panel { display: none; width: 100%; max-width: 400px; }
  .panel.active { display: block; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    width: 100%;
  }

  .field { margin-bottom: 20px; }

  .field label {
    display: block;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .field label .dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
    position: relative;
    top: -1px;
  }

  .dot-green { background: var(--accent); }
  .dot-blue { background: var(--accent2); }
  .dot-orange { background: var(--accent3); }

  input[type="time"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 1.4rem;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
    appearance: none;
  }

  input[type="time"]:focus { border-color: var(--accent); }

  input[type="time"]::-webkit-calendar-picker-indicator {
    filter: invert(1) opacity(0.3);
    cursor: pointer;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 20px 0;
  }

  button {
    width: 100%;
    background: var(--accent);
    color: #0d0f14;
    border: none;
    border-radius: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    padding: 14px;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
    text-transform: uppercase;
  }

  button:active { transform: scale(0.97); opacity: 0.85; }

  .result {
    margin-top: 20px;
    display: none;
  }

  .result.visible { display: block; }

  .result-card {
    background: var(--bg);
    border: 1px solid var(--accent);
    border-radius: 14px;
    padding: 20px 24px;
    text-align: center;
    animation: fadeUp 0.35s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-label {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .result-times {
    display: flex;
    gap: 12px;
    margin-bottom: 4px;
  }

  .result-block {
    flex: 1;
    background: var(--card);
    border-radius: 10px;
    padding: 14px 10px;
    text-align: center;
    border: 1px solid var(--border);
  }

  .result-block-label {
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .result-time {
    font-family: 'Fraunces', serif;
    font-size: clamp(1.8rem, 9vw, 2.6rem);
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .result-time.green { color: var(--accent); }
  .result-time.blue  { color: var(--accent2); }
  .result-time.orange { color: var(--accent3); }

  .result-sub {
    margin-top: 14px;
    font-size: 0.72rem;
    color: var(--muted);
    line-height: 1.7;
  }

  .result-sub span { color: var(--text); }

  .error-msg {
    background: rgba(240,96,96,0.1);
    border: 1px solid var(--red);
    border-radius: 10px;
    color: var(--red);
    font-size: 0.75rem;
    padding: 12px 16px;
    margin-top: 16px;
    text-align: center;
    display: none;
  }

  .error-msg.visible { display: block; }

  .reset-btn {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    margin-top: 12px;
    font-size: 0.72rem;
  }

  /* Zeit-Blöcke */
  .block-list { margin-bottom: 16px; }

  .block-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    animation: fadeUp 0.2s ease;
  }

  .block-row .von-bis {
    display: flex;
    flex: 1;
    gap: 6px;
    align-items: center;
  }

  .block-row input[type="time"] {
    font-size: 1rem;
    padding: 10px 10px;
  }

  .block-row .sep {
    color: var(--muted);
    font-size: 0.75rem;
    flex-shrink: 0;
  }

  .del-btn {
    width: 36px;
    height: 36px;
    min-width: 36px;
    padding: 0;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--red);
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s;
  }

  .del-btn:active { background: rgba(240,96,96,0.1); transform: scale(0.95); }

  .add-btn {
    background: transparent;
    border: 1px dashed var(--accent);
    color: var(--accent);
    border-radius: 10px;
    padding: 10px;
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    margin-bottom: 16px;
  }

  .block-number {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    margin-bottom: 4px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<header>
  <h1>Arbeits<span>zeit</span></h1>
  <p>8.2 und 9-Stunden / Zeitblöcke Rechner</p>
</header>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('feierabend')">8.2 und 9-Stunden</div>
  <div class="tab" onclick="switchTab('summe')">Zeitblöcke</div>
</div>

<!-- Panel 1: Feierabend -->
<div class="panel active" id="panel-feierabend">
  <div class="card">
    <div class="field">
      <label><span class="dot dot-green"></span>Ankunftszeit</label>
      <input type="time" id="ankunft" />
    </div>
    <div class="field">
      <label><span class="dot dot-blue"></span>Start Mittagspause</label>
      <input type="time" id="pauseStart" />
    </div>
    <div class="field">
      <label><span class="dot dot-orange"></span>Ende Mittagspause</label>
      <input type="time" id="pauseEnde" />
    </div>
    <div class="divider"></div>
    <button onclick="berechnen()">Berechnen</button>
    <div class="error-msg" id="errorMsg"></div>
    <div class="result" id="result">
      <div class="result-card">
        <div class="result-label">Uhrzeit für 8.2h und 9h Arbeitszeit</div>
        <div class="result-times">
          <div class="result-block">
            <div class="result-block-label">8.2 Stunden</div>
            <div class="result-time green" id="feierabend8h">--:--</div>
          </div>
          <div class="result-block">
            <div class="result-block-label">9 Stunden</div>
            <div class="result-time blue" id="feierabend9h">--:--</div>
          </div>
        </div>
        <div class="result-sub" id="resultDetails"></div>
      </div>
      <button class="reset-btn" onclick="zuruecksetzen()">Zurücksetzen</button>
    </div>
  </div>
</div>

<!-- Panel 2: Zeitblöcke summieren -->
<div class="panel" id="panel-summe">
  <div class="card">
    <div class="block-number">Zeitblöcke eingeben:</div>
    <div class="block-list" id="blockList"></div>
    <button class="add-btn" onclick="addBlock()">+ Zeitblock hinzufügen</button>
    <div class="divider"></div>
    <button onclick="berechnenSumme()">Berechnen</button>
    <div class="error-msg" id="errorMsg2"></div>
    <div class="result" id="result2">
      <div class="result-card">
        <div class="result-label">⏱ Gesamte Arbeitszeit</div>
        <div class="result-time orange" id="summeResult" style="font-size: clamp(2.2rem, 11vw, 3.2rem); margin: 8px 0;">--:--</div>
        <div class="result-sub" id="summeDetails"></div>
      </div>
      <button class="reset-btn" onclick="zuruecksetzenSumme()">Zurücksetzen</button>
    </div>
  </div>
</div>

<script>
// ── Tab switcher ──────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && name === 'feierabend') || (i === 1 && name === 'summe'));
  });
  document.getElementById('panel-feierabend').classList.toggle('active', name === 'feierabend');
  document.getElementById('panel-summe').classList.toggle('active', name === 'summe');
}

// ── Helpers ───────────────────────────────────────────
function toMinutes(val) {
  const [h, m] = val.split(':').map(Number);
  return h * 60 + m;
}

function toTimeStr(minutes) {
  const h = Math.floor(minutes / 60) % 24;
  const m = minutes % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function minToHM(minutes) {
  const h = Math.floor(minutes / 60);
  const m = minutes % 60;
  return `${h}h ${String(m).padStart(2,'0')}min`;
}

// ── Panel 1: Feierabend ───────────────────────────────
function berechnen() {
  const err = document.getElementById('errorMsg');
  const result = document.getElementById('result');
  err.classList.remove('visible');
  result.classList.remove('visible');

  const ankunft = document.getElementById('ankunft').value;
  const pauseStart = document.getElementById('pauseStart').value;
  const pauseEnde = document.getElementById('pauseEnde').value;

  if (!ankunft || !pauseStart || !pauseEnde) {
    err.textContent = 'Bitte alle drei Zeiten eingeben.';
    err.classList.add('visible');
    return;
  }

  const aMin = toMinutes(ankunft);
  const psMin = toMinutes(pauseStart);
  const peMin = toMinutes(pauseEnde);

  if (psMin <= aMin) {
    err.textContent = 'Pausenstart muss nach der Ankunft liegen.';
    err.classList.add('visible');
    return;
  }
  if (peMin <= psMin) {
    err.textContent = 'Pausenende muss nach dem Pausenstart liegen.';
    err.classList.add('visible');
    return;
  }

  const pauseDauer = peMin - psMin;
  const feierabend8h12 = aMin + (8 * 60 + 12) + pauseDauer;
  const feierabend9h   = aMin + 9 * 60 + pauseDauer;

  document.getElementById('feierabend8h').textContent = toTimeStr(feierabend8h12);
  document.getElementById('feierabend9h').textContent  = toTimeStr(feierabend9h);
  document.getElementById('resultDetails').innerHTML =
    `Ankunft: <span>${toTimeStr(aMin)}</span><br>` +
    `Pause: <span>${toTimeStr(psMin)} – ${toTimeStr(peMin)}</span> (${pauseDauer} Min.)`;

  result.classList.add('visible');
}

function zuruecksetzen() {
  ['ankunft','pauseStart','pauseEnde'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('result').classList.remove('visible');
  document.getElementById('errorMsg').classList.remove('visible');
}

// Prefill ankunft
const now = new Date();
document.getElementById('ankunft').value =
  `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

// ── Panel 2: Zeitblöcke ───────────────────────────────
let blockCount = 0;

function addBlock() {
  blockCount++;
  const list = document.getElementById('blockList');
  const row = document.createElement('div');
  row.className = 'block-row';
  row.id = `block-${blockCount}`;
  row.innerHTML = `
    <div style="flex:1">
      <div class="block-number">Block ${blockCount}</div>
      <div class="von-bis">
        <input type="time" id="von-${blockCount}" placeholder="Von">
        <span class="sep">→</span>
        <input type="time" id="bis-${blockCount}" placeholder="Bis">
      </div>
    </div>
    <button class="del-btn" onclick="removeBlock(${blockCount})">✕</button>
  `;
  list.appendChild(row);
}

function removeBlock(id) {
  const el = document.getElementById(`block-${id}`);
  if (el) el.remove();
}

function berechnenSumme() {
  const err = document.getElementById('errorMsg2');
  const result = document.getElementById('result2');
  err.classList.remove('visible');
  result.classList.remove('visible');

  const rows = document.querySelectorAll('.block-row');
  if (rows.length === 0) {
    err.textContent = 'Bitte mindestens einen Zeitblock hinzufügen.';
    err.classList.add('visible');
    return;
  }

  let totalMin = 0;
  let details = '';
  let hasError = false;

  rows.forEach((row, i) => {
    const id = row.id.split('-')[1];
    const vonVal = document.getElementById(`von-${id}`).value;
    const bisVal = document.getElementById(`bis-${id}`).value;

    if (!vonVal || !bisVal) {
      err.textContent = `Block ${i+1}: Bitte beide Zeiten eingeben.`;
      err.classList.add('visible');
      hasError = true;
      return;
    }

    const vonMin = toMinutes(vonVal);
    const bisMin = toMinutes(bisVal);

    if (bisMin <= vonMin) {
      err.textContent = `Block ${i+1}: Endzeit muss nach der Startzeit liegen.`;
      err.classList.add('visible');
      hasError = true;
      return;
    }

    const dauer = bisMin - vonMin;
    totalMin += dauer;
    details += `Block ${i+1}: <span>${vonVal} – ${bisVal}</span> = ${minToHM(dauer)}<br>`;
  });

  if (hasError) return;

  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  document.getElementById('summeResult').textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  document.getElementById('summeDetails').innerHTML = details + `<br>Total: <span>${minToHM(totalMin)}</span>`;
  result.classList.add('visible');
}

function zuruecksetzenSumme() {
  document.getElementById('blockList').innerHTML = '';
  blockCount = 0;
  document.getElementById('result2').classList.remove('visible');
  document.getElementById('errorMsg2').classList.remove('visible');
  addBlock();
}

// Start with one block
addBlock();
</script>
</body>
</html>
